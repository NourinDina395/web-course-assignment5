<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- title and logo  -->
    <title>GitHub Issue Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon" />

    <!-- font awesome  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
      integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- font integration  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <!-- tailwind+daisyui  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- stylesheet  -->
    <link rel="stylesheet" href="style/style.css" />
  
</head>

 
<body class="bg-base-200" >

 <!-- ============= LOGIN PAGE ====================== --> 
  <section>
  <div id="login-page" class="min-h-screen flex items-center justify-center">
    <div class="card bg-base-100 shadow-xl w-96 my-10">
      <div class="card-body text-center">
        <div class="flex justify-center mb-4">
      <div class="flex justify-center mb-6">
        <img src="./assets/github-logo.png" 
             alt="GitHub Logo" 
             class="w-24 h-24 rounded-3xl shadow-inner">
      </div>
        </div>
        <h1 class="text-3xl font-bold">GitHub Issues Tracker</h1>
        <p class="text-base-content/70">Sign in to manage your issues</p>
        <div class="space-y-4 mt-8 text-left"> 

          <label for="username" class="text-black-800">Username</label> 
          <input id="username" type="text" placeholder="Enter Username" class="input input-bordered w-full rounded-lg" />
           <!-- <span class="text-purple-500 text-xs -mt-1">Default: admin</span> <br> -->

          <label for="username" class="text-black-800">Password</label> 
           <input id="password" type="password" placeholder="Enter Password" class="input input-bordered w-full rounded-lg" />
           <!--  <span class="text-purple-500 text-xs -mt-1">Default: admin123</span> <br> -->
          <br><br>
          <button onclick="handleLogin()" class="btn btn-primary w-full text-lg">Sign In</button>
    
      <div class="text-xs text-base-content/60 mt-6 text-center">
        <div style="border-top:1px solid gray; text-align:center; line-height:0.1em; margin:10px 0 20px;">
          <span style="background:#fff; padding:0 10px; color:gray;">OR</span>
        </div>

         Demo Credentials:<br><br>
        <span class="font-bold">Username: </span> <span class="font-mono">admin</span> <br>
        <span class="font-bold">Password: </span> <span class="font-mono">admin123</span>
       </div>

        </div>
      </div>
    </div>
  </div>
   </section>

       <!-- ============ MAIN DASHBOARD ==================== -->
    <section>
      <div id="main-page" class=" hidden pb-12 min-h-screen bg-[#F8FAFC]">
        
      <nav class="navbar bg-base-100 shadow-sm px-6 md:px-12 py-4 ">
        <div class="flex-1">     
           <div class="flex items-center gap-3">  
                <div class="w-10 h-10 bg-white rounded-2xl flex items-center justify-center text-white">       
                  <img src="./assets/github-logo.png"              
                          alt="GitHub Logo" 
                     class="">         
          </div>       
              <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>   
            </div>    
              </div>    
            <div class="flex gap-2">      
         <input id="search-input" type="text" placeholder="Search issues..."           
            class="input input-bordered w-80" onkeypress="if(event.key==='Enter') searchIssues()"/>     
       <button onclick="searchIssues()" class="btn btn-primary">Search</button>
          </div>    
         </nav>

    <div class="mb-20 mt-20 px-8 bg-base-100">

    
    <!-- Tabs -->
  <!-- Tabs for medium & large screens -->
<div class="tabs tabs-lifted px-8 pt-6 hidden md:flex gap-2" id="tabs"> 
  <button onclick="switchTab(0)" class="btn btn-primary tab-active" id="tab-all">All</button>
  <button onclick="switchTab(1)" class="btn" id="tab-open">Open</button>
  <button onclick="switchTab(2)" class="btn" id="tab-closed">Closed</button>
</div>

<!-- Dropdown for small screens -->
<div class="md:hidden relative px-8 pt-6">
  <button id="dropdownBtn" class="btn btn-ghost w-12 h-12 flex items-center justify-center text-xl">⋮</button>

  <div id="dropdownMenu" class="absolute right-8 mt-2 w-32 bg-base-100 shadow-lg rounded-md hidden flex-col">
    <button onclick="switchTab(0); toggleDropdown()" class="px-4 py-2 text-left hover:bg-gray-100">All</button>
    <button onclick="switchTab(1); toggleDropdown()" class="px-4 py-2 text-left hover:bg-gray-100">Open</button>
    <button onclick="switchTab(2); toggleDropdown()" class="px-4 py-2 text-left hover:bg-gray-100">Closed</button>
  </div>
</div>

  <br><br>


    <!-- Issues Header -->
      <div class="px-8 py-4 flex flex-col md:flex-row md:items-center md:justify-between gap-4 bg-base-100">

      <div class="flex items-center gap-3">
            <img src="./assets/Aperture.png" alt="50 Issues" 
                       class="w-18 h-18 radius-md object-contain rounded-lg shadow-2xl">
        
        <div>
          <span id="issue-count" class="text-3xl font-bold">50</span>
          <span class="text-2xl font-bold">Issues</span>
          <br>
          <p class="text-sm text-base-content/60">Track and manage your project issues</p>

        </div>
      </div>

        <div class="flex flex-col md:flex-row gap-4 md:items-center">
      <div class="flex gap-6 text-sm ">
        <div class="flex items-center gap-2">
          <span class="w-3 h-3 bg-green-500 rounded-full"></span> Open
        </div>
        <div class="flex items-center gap-2">
          <span class="w-3 h-3 bg-purple-600 rounded-full"></span> Closed
        </div>
      </div>
      <button onclick="alert('New issue form coming in next assignment')" 
              class="btn btn-primary btn-sm">+ New Issue</button>
    </div>
    </div>


    <!-- Spinner -->
    <div id="spinner" class="hidden flex justify-center py-20">
      <span class="loading loading-bars loading-xl"></span>
    </div>


    <!-- Issues Grid -->
    <div id="issues-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 p-8">
      <!-- Cards generated by JS -->
    </div>


    <dialog id="issue-detail-modal" class="modal">
  <div class="modal-box max-w-2xl bg-white rounded-xl shadow-2xl p-0 overflow-hidden border border-blue-200">

    <!-- Header / Title -->
    <div class="bg-blue-50 px-6 py-5 border-b border-blue-200">
      <h3 id="modal-title" class="text-2xl font-bold text-gray-900"></h3>
    </div>

    <!-- Main content -->
    <div class="p-6 space-y-6">

      <!-- Status + meta line -->
      <div class="flex flex-wrap items-center gap-4 text-sm">
        <span id="modal-status" class="inline-flex items-center gap-2 px-3 py-1 rounded-full text-white font-medium"></span>
        <span class="text-gray-600">
          • Opened by <span id="modal-author" class="font-medium text-gray-800"></span>
          • <span id="modal-date" class="text-gray-500"></span>
        </span>
      </div>

      <!-- Labels -->
      <div id="modal-labels" class="flex flex-wrap gap-2"></div>

      <!-- Description -->
      <div class="prose max-w-none text-gray-700">
        <p id="modal-description"></p>
      </div>

      <!-- Assignee & Priority grid -->
      <div class="flex flex-wrap items-start justify-between gap-6 pt-5 border-t border-gray-200">
        <div>
          <div class="text-sm text-gray-500 mb-1 m-6">Assignee:</div>
          <div id="modal-assignee" class="font-medium text-gray-900 text-lg m-6"></div>
        </div>
        
        <div>
          <div class="text-sm text-gray-500 mb-1 text-right m-6">Priority:</div>
          <span id="modal-priority" class="inline-flex px-5 py-2 rounded-md font-semibold text-white"></span>
        </div>
      </div>

    <!-- Footer with Close button -->
    <div class="px-6 py-5 bg-gray-50 border-t border-gray-200 flex justify-end">
      <button 
        onclick="document.getElementById('issue-detail-modal').close()" 
                   class="btn btn-primary px-8">
        Close
      </button>
    </div>
  </div>

  <!-- Click outside to close (optional) -->
    <form method="dialog" class="modal-backdrop">
    <button>close</button>
    </form>
   </dialog>

  </div>
 </div>

</section>


 


    <script src="./script/index.js"></script>
    
  </body>
</html>
